<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 3 - ABM de libros </title>
</head>
<body>
    <h1>Catálogo con ABM</h1>
    
    <section>
        <h2>Cargar Nuevo Libro</h2>
        <input type="text" id="nuevoTitulo" placeholder="Título">
        <input type="text" id="nuevoAutor" placeholder="Autor">
        <input type="number" id="nuevoPrecio" placeholder="Precio">
        <label><input type="checkbox" id="nuevoDisponible"> Disponible</label>
        <button id="btnAgregar">Agregar Libro</button>
        <div id="errorForm" style="color: red;"></div>
    </section>

    <hr>

    <input type="text" id="filtroAutor" placeholder="Autor">
    <button id="filtrar">Filtrar</button>
    <button id="mostrarDisponibles">Solo disponibles</button>
    <button id="mostrarTodos">Ver todos</button>

    <ul id="listado"></ul>
    <p id="stats"></p>

    <script src="app.js"></script>
</body>
</html>
